name: Build Flatpak

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  flatpak:
    name: Build & Bundle Flatpak
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged
    strategy:
      matrix:
        variant:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.variant.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build AIStudio flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: AIStudio.flatpak
          manifest-path: org.MindWorkAI.AIStudio.yml
          arch: ${{ matrix.variant.arch }}
          cache-key: ai-studio
          cache: true
          branch: stable

      - name: Prepare plugin builds
        run: flatpak install --system -y --noninteractive ./AIStudio.flatpak

      - name: Build Pandoc plugin
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: AIStudio-plugin-pandoc.flatpak
          manifest-path: plugins/pandoc/org.MindWorkAI.AIStudio.plugin.pandoc.yml
          arch: ${{ matrix.variant.arch }}
          cache-key: pandoc-plugin
          cache: true
