id: org.mindworkai.AIStudio
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.dotnet9
  - org.freedesktop.Sdk.Extension.rust-stable
command: mind-work-ai-studio
add-extensions:
  org.mindworkai.AIStudio.plugin:
    version: '1'
    directory: plugins
    subdirectories: true
    no-autodownload: true
    autodelete: true
  org.mindworkai.AIStudio.provisioning:
    directory: etc/MindWorkAI
    no-autodownload: true
finish-args:
  - --env=no_proxy=localhost,127.0.0.1
  - --socket=wayland
  - --socket=x11
  - --socket=pulseaudio
  - --filesystem=home:ro
  - --device=dri
  - --share=ipc
  - --share=network
  - --talk-name=org.freedesktop.secrets
  - --talk-name=org.gnome.keyring.SystemPrompter
cleanup:
  - pkgconfig/
  - include/
  - "*.rlib"
  - lib/dotnet
  - bin/dotnet
  - bin/unifdef*
cleanup-commands:
  - mkdir -p ${FLATPAK_DEST}/plugins
  - mkdir -p ${FLATPAK_DEST}/etc/MindWorkAI
modules:
  - name: dotnet
    buildsystem: simple
    build-commands:
      - /usr/lib/sdk/dotnet9/bin/install.sh
  - name: tauri-cli
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/tauri-cli/cargo
    build-commands:
      - cargo install --path crates/tauri-cli --root /app --offline --locked
    sources:
      - type: git
        url: https://github.com/tauri-apps/tauri
        tag: tauri-cli-v2.11.0
      - 'tauri-cli-sources.json'
  - name: mind-work-ai-studio
    buildsystem: simple
    build-options:
      append-path: '/usr/lib/sdk/rust-stable/bin'
      prepend-path: '/usr/lib/sdk/dotnet9/bin'
      append-ld-library-path: /usr/lib/sdk/dotnet9/lib
      prepend-pkg-config-path: /usr/lib/sdk/dotnet9/lib/pkgconfig
      env:
        CARGO_HOME: /run/build/mind-work-ai-studio/cargo
        CARGO_NET_OFFLINE: 'true'
        RestoreAdditionalProjectSources: "/run/build/mind-work-ai-studio/nuget-sources;/usr/lib/sdk/dotnet9/nuget/packages"
    sources:
      - type: git
        url: https://github.com/MindWorkAI/AI-Studio
        tag: v26.7.3
        commit: f66676041584b87a9adb365aaaa9cf736c807564
        x-checker-data:
          type: git
          tag-pattern: ^(v[0-9]+\.[0-9]+\.[0-9]+)$
      - type: archive
        only-arches: [x86_64]
        url: https://github.com/bblanchon/pdfium-binaries/releases/download/chromium%2F7763/pdfium-linux-x64.tgz
        sha256: e3f0c66b2daad710cb6c8edd4a8c45c8902995e359dc0775917fc16e2e56349d
        dest: pdfium-tmp
      - type: archive
        only-arches: [aarch64]
        url: https://github.com/bblanchon/pdfium-binaries/releases/download/chromium%2F7763/pdfium-linux-arm64.tgz
        sha256: 1518d09bbf09a1bef27a6f93656d95b55bd22bcaecda597679e05f4e82c5fbfa
        dest: pdfium-tmp
      - 'dotnet-sources.json'
      - 'cargo-sources.json'
    build-commands:
      - mkdir -p runtime/resources/libraries
      - cp pdfium-tmp/libpdfium.so runtime/resources/libraries/libpdfium.so
      - cargo --offline fetch --manifest-path runtime/Cargo.toml --verbose
      - 'cd app/Build; dotnet run build --offline'
      - install -Dm755 runtime/target/release/mindworkAIStudioServer /app/bin/mindworkAIStudioServer
      - install -Dm755 runtime/target/release/MindWork\ AI\ Studio /app/bin/mind-work-ai-studio
      - install -Dm644 runtime/target/release/resources/libraries/libpdfium.so /app/lib/libpdfium.so
      - install -Dm644 runtime/packaging/linux/org.mindworkai.AIStudio.desktop /app/share/applications/org.mindworkai.AIStudio.desktop
      - install -Dm644 runtime/packaging/linux/org.mindworkai.AIStudio.metainfo.xml /app/share/metainfo/org.mindworkai.AIStudio.metainfo.xml
      - install -Dm644 runtime/icons/icon.png /app/share/icons/hicolor/512x512/apps/org.mindworkai.AIStudio.png
